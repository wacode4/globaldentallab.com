<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin - Global Dental Lab</title>
    <script data-cfasync="false" src="https://cdn.tailwindcss.com"></script>
    <script data-cfasync="false">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0083C9',
                        navy: '#001B39',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Login Screen -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
            <h1 class="text-2xl font-bold text-navy mb-6 text-center">Admin Login</h1>
            <div class="space-y-4">
                <input type="password" id="authKey" placeholder="Enter access key"
                    class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-primary">
                <button onclick="login()"
                    class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-primary/90">
                    Login
                </button>
                <p id="loginError" class="text-red-500 text-center hidden">Invalid key</p>
            </div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="dashboard" class="hidden">
        <!-- Header -->
        <header class="bg-navy text-white py-4 px-6 shadow">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold">Global Dental Lab - Admin</h1>
                <button onclick="logout()" class="text-sm bg-white/10 px-4 py-2 rounded hover:bg-white/20">
                    Logout
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6">
            <!-- Stats Cards -->
            <div class="grid md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white rounded-lg shadow p-6">
                    <p class="text-gray-500 text-sm">Total Inquiries</p>
                    <p id="statTotal" class="text-3xl font-bold text-navy">-</p>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <p class="text-gray-500 text-sm">New Inquiries</p>
                    <p id="statNew" class="text-3xl font-bold text-primary">-</p>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <p class="text-gray-500 text-sm">Active Subscriptions</p>
                    <p id="statSubs" class="text-3xl font-bold text-green-600">-</p>
                </div>
            </div>

            <!-- Tabs -->
            <div class="flex gap-4 mb-6">
                <button onclick="showTab('inquiries')" id="tabInquiries"
                    class="px-6 py-2 rounded-lg font-medium bg-primary text-white">
                    Inquiries
                </button>
                <button onclick="showTab('subscriptions')" id="tabSubscriptions"
                    class="px-6 py-2 rounded-lg font-medium bg-gray-200 text-gray-700">
                    Subscriptions
                </button>
            </div>

            <!-- Inquiries Table -->
            <div id="inquiriesPanel" class="bg-white rounded-lg shadow overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="text-left py-3 px-4 font-semibold text-sm text-gray-600">ID</th>
                                <th class="text-left py-3 px-4 font-semibold text-sm text-gray-600">Name</th>
                                <th class="text-left py-3 px-4 font-semibold text-sm text-gray-600">Email</th>
                                <th class="text-left py-3 px-4 font-semibold text-sm text-gray-600">Phone</th>
                                <th class="text-left py-3 px-4 font-semibold text-sm text-gray-600">Service</th>
                                <th class="text-left py-3 px-4 font-semibold text-sm text-gray-600">Message</th>
                                <th class="text-left py-3 px-4 font-semibold text-sm text-gray-600">Date</th>
                                <th class="text-left py-3 px-4 font-semibold text-sm text-gray-600">Status</th>
                            </tr>
                        </thead>
                        <tbody id="inquiriesBody">
                            <tr><td colspan="8" class="py-8 text-center text-gray-500">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Subscriptions Table -->
            <div id="subscriptionsPanel" class="bg-white rounded-lg shadow overflow-hidden hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="text-left py-3 px-4 font-semibold text-sm text-gray-600">ID</th>
                                <th class="text-left py-3 px-4 font-semibold text-sm text-gray-600">Email</th>
                                <th class="text-left py-3 px-4 font-semibold text-sm text-gray-600">Date</th>
                                <th class="text-left py-3 px-4 font-semibold text-sm text-gray-600">Status</th>
                            </tr>
                        </thead>
                        <tbody id="subscriptionsBody">
                            <tr><td colspan="4" class="py-8 text-center text-gray-500">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script data-cfasync="false">
        let authKey = '';

        function login() {
            authKey = document.getElementById('authKey').value;
            fetch(`/api/admin/stats?key=${authKey}`)
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById('loginError').classList.remove('hidden');
                    } else {
                        document.getElementById('loginScreen').classList.add('hidden');
                        document.getElementById('dashboard').classList.remove('hidden');
                        loadData();
                    }
                });
        }

        function logout() {
            authKey = '';
            document.getElementById('authKey').value = '';
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
        }

        function loadData() {
            // Load stats
            fetch(`/api/admin/stats?key=${authKey}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('statTotal').textContent = data.totalInquiries;
                    document.getElementById('statNew').textContent = data.newInquiries;
                    document.getElementById('statSubs').textContent = data.activeSubscriptions;
                });

            // Load inquiries
            fetch(`/api/admin/inquiries?key=${authKey}`)
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('inquiriesBody');
                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="8" class="py-8 text-center text-gray-500">No inquiries yet</td></tr>';
                        return;
                    }
                    tbody.innerHTML = data.map(row => `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="py-3 px-4 text-sm">${row.id}</td>
                            <td class="py-3 px-4 text-sm font-medium">${row.first_name} ${row.last_name}</td>
                            <td class="py-3 px-4 text-sm"><a href="mailto:${row.email}" class="text-primary hover:underline">${row.email}</a></td>
                            <td class="py-3 px-4 text-sm">${row.phone || '-'}</td>
                            <td class="py-3 px-4 text-sm">${row.service || '-'}</td>
                            <td class="py-3 px-4 text-sm max-w-xs truncate" title="${row.message}">${row.message}</td>
                            <td class="py-3 px-4 text-sm text-gray-500">${new Date(row.created_at).toLocaleString()}</td>
                            <td class="py-3 px-4 text-sm">
                                <span class="px-2 py-1 rounded text-xs font-medium ${row.status === 'new' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'}">
                                    ${row.status}
                                </span>
                            </td>
                        </tr>
                    `).join('');
                });

            // Load subscriptions
            fetch(`/api/admin/subscriptions?key=${authKey}`)
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('subscriptionsBody');
                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" class="py-8 text-center text-gray-500">No subscriptions yet</td></tr>';
                        return;
                    }
                    tbody.innerHTML = data.map(row => `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="py-3 px-4 text-sm">${row.id}</td>
                            <td class="py-3 px-4 text-sm"><a href="mailto:${row.email}" class="text-primary hover:underline">${row.email}</a></td>
                            <td class="py-3 px-4 text-sm text-gray-500">${new Date(row.created_at).toLocaleString()}</td>
                            <td class="py-3 px-4 text-sm">
                                <span class="px-2 py-1 rounded text-xs font-medium ${row.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'}">
                                    ${row.status}
                                </span>
                            </td>
                        </tr>
                    `).join('');
                });
        }

        function showTab(tab) {
            document.getElementById('inquiriesPanel').classList.toggle('hidden', tab !== 'inquiries');
            document.getElementById('subscriptionsPanel').classList.toggle('hidden', tab !== 'subscriptions');
            document.getElementById('tabInquiries').classList.toggle('bg-primary', tab === 'inquiries');
            document.getElementById('tabInquiries').classList.toggle('text-white', tab === 'inquiries');
            document.getElementById('tabInquiries').classList.toggle('bg-gray-200', tab !== 'inquiries');
            document.getElementById('tabInquiries').classList.toggle('text-gray-700', tab !== 'inquiries');
            document.getElementById('tabSubscriptions').classList.toggle('bg-primary', tab === 'subscriptions');
            document.getElementById('tabSubscriptions').classList.toggle('text-white', tab === 'subscriptions');
            document.getElementById('tabSubscriptions').classList.toggle('bg-gray-200', tab !== 'subscriptions');
            document.getElementById('tabSubscriptions').classList.toggle('text-gray-700', tab !== 'subscriptions');
        }

        // Enter key to login
        document.getElementById('authKey').addEventListener('keypress', e => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
